<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrbitWatch — Starlink Collision Intelligence</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

  <!-- Top bar -->
  <div id="topbar">
    <div id="logo">OrbitWatch</div>
    <div id="nav">
      <button class="nav-btn active" id="btn-globe"      onclick="showView('globe')">Globe</button>
      <button class="nav-btn"        id="btn-dashboard"  onclick="showView('dashboard')">Analytics</button>
      <button class="nav-btn"        id="btn-maneuvers"  onclick="showView('maneuvers')">Maneuvers</button>
    </div>
    <div id="stats">
      <span id="stat-sats">Satellites: —</span>
      <span id="stat-conj">Conjunctions: —</span>
      <span id="stat-critical">Critical: —</span>
      <span id="stat-time">UTC: —</span>
    </div>
  </div>

  <!-- 3D Globe canvas — always alive -->
  <canvas id="globe-canvas"></canvas>

  <!-- Search bar (globe view only) -->
  <div id="search-bar">
    <input
      id="sat-search"
      type="text"
      placeholder="Search satellite..."
      oninput="handleSearch(this.value)"
      autocomplete="off"
    />
    <div id="search-results"></div>
  </div>

  <!-- Right panel — alerts -->
  <div id="side-panel">
    <div id="panel-title">Collision Alerts</div>
    <div id="alert-list"></div>
  </div>

  <!-- Analytics dashboard -->
  <div id="dashboard-view" class="view hidden">
    <div class="dashboard-grid">
      <div class="chart-card">
        <div class="chart-title">Risk Level Distribution</div>
        <canvas id="chart-risk"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Top 10 High-Risk Satellites</div>
        <canvas id="chart-topsats"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Miss Distance Distribution</div>
        <canvas id="chart-distance"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Relative Velocity Distribution</div>
        <canvas id="chart-velocity"></canvas>
      </div>
    </div>
  </div>

  <!-- Maneuver panel -->
  <div id="maneuvers-view" class="view hidden">
    <div id="maneuver-header-row">
      <div class="view-header" style="margin:0">Maneuver Recommendations</div>
      <button class="export-btn" onclick="exportCSV()">Export CSV</button>
      <button class="export-btn" onclick="exportJSON()">Export JSON</button>
    </div>
    <div id="maneuver-list"></div>
  </div>

  <!-- Satellite inspector overlay -->
  <div id="inspector" class="hidden">
    <div id="inspector-close" onclick="closeInspector()">✕</div>
    <div id="inspector-name"></div>
    <div id="inspector-body"></div>
  </div>

  <!-- Bottom bar -->
  <div id="bottombar">
    <span id="status-msg">Initialising...</span>
  </div>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.3/satellite.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <!-- Our JS files — order matters -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/globe.js"></script>
  <script src="/static/js/satellites.js"></script>
  <script src="/static/js/conjunctions.js"></script>
  <script src="/static/js/alerts.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/maneuver.js"></script>
  <script src="/static/js/search.js"></script>
  <script src="/static/js/inspector.js"></script>
  <script src="/static/js/export.js"></script>
  <script src="/static/js/router.js"></script>
  <script src="/static/js/main.js"></script>

</body>
</html>
